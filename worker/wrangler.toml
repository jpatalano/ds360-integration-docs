name = "ds360-auth-worker"
main = "index.js"
compatibility_date = "2024-01-01"

# Routes — worker intercepts /api/* and adds headers to all other requests
# Update the zone_name to match your Cloudflare domain
[[routes]]
pattern = "docs.incadence.com/*"
zone_name = "incadence.com"

# Environment variables — set MSD_JWT_SECRET via Cloudflare dashboard
# Never put the actual secret value here
# Run: wrangler secret put MSD_JWT_SECRET
[vars]
# Non-secret config vars go here if needed
